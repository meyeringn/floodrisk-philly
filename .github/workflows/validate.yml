name: Validate FloodRisk Philly

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Confirm required files
        run: |
          test -f index.html
          test -f css/styles.css
          test -f js/i18n.js
          test -f js/app.js
          test -f METHODOLOGY.md
          test -f PRIVACY.md
          test -f README.md

      - name: Check JavaScript syntax
        run: |
          node --check js/i18n.js
          node --check js/app.js

      - name: Check local file references
        run: |
          grep -q 'href="css/styles.css"' index.html
          grep -q 'src="js/i18n.js"' index.html
          grep -q 'src="js/app.js"' index.html
          grep -q 'href="METHODOLOGY.md"' index.html
          grep -q 'href="PRIVACY.md"' index.html

      - name: Reject accidental secrets
        run: |
          if grep -RInE '(api[_-]?key|client[_-]?secret|access[_-]?token)[[:space:]]*[:=][[:space:]]*["'"'][^"'"']+["'"']' .             --exclude-dir=.git             --exclude='validate.yml'; then
            echo "Possible secret found."
            exit 1
          fi

      - name: Check HTML has core accessibility hooks
        run: |
          grep -q 'class="skip-link"' index.html
          grep -q 'aria-live="polite"' index.html
          grep -q 'id="main-content"' index.html
          grep -q 'lang="en"' index.html
